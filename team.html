<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Management | InsightSphere</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f8fafc;
display:flex;
min-height:100vh;
}

.sidebar{
width:260px;
background:linear-gradient(180deg,#2563eb,#7c3aed);
color:white;
padding:25px;
position:fixed;
height:100%;
}

.logo{
font-size:28px;
font-weight:700;
margin-bottom:40px;
}

.menu a{
display:block;
padding:14px;
margin-bottom:10px;
color:white;
text-decoration:none;
border-radius:10px;
}

.menu a:hover{
background:rgba(255,255,255,.15);
}

.active{
background:rgba(255,255,255,.2);
}

.main{
margin-left:260px;
padding:30px;
flex:1;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.btn{
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
color:white;
font-weight:600;
background:linear-gradient(90deg,#2563eb,#7c3aed);
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.stat-card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.05);
}

.stat-card h2{
font-size:30px;
color:#2563eb;
}

.toolbar{
display:flex;
justify-content:space-between;
gap:15px;
margin-bottom:25px;
}

.search-box{
flex:1;
}

.search-box input{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:10px;
}

.table-card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.05);
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#f8fafc;
padding:15px;
text-align:left;
}

td{
padding:15px;
border-bottom:1px solid #eee;
}

.user-cell{
display:flex;
align-items:center;
gap:10px;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
background:linear-gradient(90deg,#2563eb,#7c3aed);
color:white;
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
}

.role-select{
padding:8px;
border:1px solid #ddd;
border-radius:8px;
}

.status{
padding:6px 12px;
border-radius:20px;
font-size:12px;
font-weight:600;
}

.online{
background:#dcfce7;
color:#16a34a;
}

.offline{
background:#fee2e2;
color:#dc2626;
}

.delete-btn{
background:#ef4444;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
}

.activity{
margin-top:25px;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.05);
}

.log-item{
background:#f8fafc;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:30px;
border-radius:20px;
width:420px;
max-width:95%;
}

.modal-content input,
.modal-content select{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:10px;
}

.modal-actions{
display:flex;
gap:10px;
}

.cancel-btn{
background:#d1d5db;
color:#111827;
}

</style>
</head>
<body>

<div class="sidebar">

<div class="logo">InsightSphere</div>

<div class="menu">
<a href="dashboard.html">🏠 Dashboard</a>
<a href="datasources.html">📁 Data Sources</a>
<a href="reportbuilder.html">📄 Report Builder</a>
<a href="analytics.html">📊 Analytics</a>
<a href="team.html" class="active">👥 Team Management</a>
<a href="billing.html">💳 Billing</a>
<a href="settings.html">⚙ Settings</a>
<a href="index.html">🚪 Logout</a>
</div>

</div>

<div class="main">

<div class="header">
<div>
<h1>Team Management</h1>
<p>Manage members and permissions</p>
</div>

<button class="btn" onclick="openModal()">
+ Invite Member
</button>
</div>

<div class="stats">

<div class="stat-card">
<h2 id="totalMembers">0</h2>
<p>Total Members</p>
</div>

<div class="stat-card">
<h2 id="adminCount">0</h2>
<p>Admins</p>
</div>

<div class="stat-card">
<h2 id="editorCount">0</h2>
<p>Editors</p>
</div>

<div class="stat-card">
<h2 id="viewerCount">0</h2>
<p>Viewers</p>
</div>

</div>

<div class="toolbar">

<div class="search-box">
<input
type="text"
id="searchInput"
placeholder="Search members..."
onkeyup="searchMembers()">
</div>

<button class="btn" onclick="exportCSV()">
Export CSV
</button>

</div>

<div class="table-card">

<table>

<thead>
<tr>
<th>Member</th>
<th>Email</th>
<th>Role</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="memberBody">
</tbody>

</table>

</div>

<div class="activity">
<h2>Recent Activity</h2>
<div id="activityLog"></div>
</div>

<div class="modal" id="inviteModal">

<div class="modal-content">

<h2>Invite Member</h2>

<input type="text" id="memberName" placeholder="Full Name">

<input type="email" id="memberEmail" placeholder="Email Address">

<select id="memberRole">
<option>Admin</option>
<option>Editor</option>
<option>Viewer</option>
</select>

<select id="memberStatus">
<option>Online</option>
<option>Offline</option>
</select>

<div class="modal-actions">

<button class="btn" onclick="addMember()">
Invite
</button>

<button
class="btn cancel-btn"
onclick="closeModal()">
Cancel
</button>

</div>

</div>

</div>
<script>

let members = JSON.parse(localStorage.getItem("teamMembers")) || [

{
name:"John Smith",
email:"john@company.com",
role:"Admin",
status:"Online"
},

{
name:"Sarah Johnson",
email:"sarah@company.com",
role:"Editor",
status:"Online"
},

{
name:"David Lee",
email:"david@company.com",
role:"Viewer",
status:"Offline"
},

{
name:"Emily Brown",
email:"emily@company.com",
role:"Editor",
status:"Online"
}

];

function saveMembers(){
localStorage.setItem(
"teamMembers",
JSON.stringify(members)
);
}

function getInitials(name){
return name
.split(" ")
.map(word => word[0])
.join("")
.toUpperCase();
}

function renderMembers(){

const body =
document.getElementById("memberBody");

body.innerHTML="";

members.forEach((member,index)=>{

body.innerHTML += `

<tr>

<td>

<div class="user-cell">

<div class="avatar">
${getInitials(member.name)}
</div>

<div>
<strong>${member.name}</strong>
</div>

</div>

</td>

<td>${member.email}</td>

<td>

<select
class="role-select"
onchange="updateRole(${index},this.value)">

<option
${member.role==="Admin"?"selected":""}>
Admin
</option>

<option
${member.role==="Editor"?"selected":""}>
Editor
</option>

<option
${member.role==="Viewer"?"selected":""}>
Viewer
</option>

</select>

</td>

<td>

<span class="status
${member.status==="Online"
? "online"
: "offline"}">

${member.status}

</span>

</td>

<td>

<button
class="delete-btn"
onclick="deleteMember(${index})">

Delete

</button>

</td>

</tr>

`;

});

updateStats();

}

function updateStats(){

document.getElementById(
"totalMembers"
).innerText = members.length;

document.getElementById(
"adminCount"
).innerText =
members.filter(
m=>m.role==="Admin"
).length;

document.getElementById(
"editorCount"
).innerText =
members.filter(
m=>m.role==="Editor"
).length;

document.getElementById(
"viewerCount"
).innerText =
members.filter(
m=>m.role==="Viewer"
).length;

}

function openModal(){

document.getElementById(
"inviteModal"
).style.display="flex";

}

function closeModal(){

document.getElementById(
"inviteModal"
).style.display="none";

}

function addActivity(message){

const log =
document.getElementById(
"activityLog"
);

const item =
document.createElement("div");

item.className="log-item";

item.innerHTML=
new Date().toLocaleString()
+
" - "
+
message;

log.prepend(item);

}

function addMember(){

let name =
document.getElementById(
"memberName"
).value.trim();

let email =
document.getElementById(
"memberEmail"
).value.trim();

let role =
document.getElementById(
"memberRole"
).value;

let status =
document.getElementById(
"memberStatus"
).value;

if(name==="" || email===""){

alert(
"Please fill all fields"
);

return;

}

members.push({

name,
email,
role,
status

});

saveMembers();

renderMembers();

addActivity(
name + " joined the team"
);

closeModal();

document.getElementById(
"memberName"
).value="";

document.getElementById(
"memberEmail"
).value="";

}

function deleteMember(index){

let memberName =
members[index].name;

if(
confirm(
"Remove " +
memberName +
" ?"
)
){

members.splice(index,1);

saveMembers();

renderMembers();

addActivity(
memberName +
" removed from team"
);

}

}

function updateRole(index,newRole){

members[index].role =
newRole;

saveMembers();

updateStats();

addActivity(
members[index].name +
" role changed to " +
newRole
);

}

function searchMembers(){

let input =
document.getElementById(
"searchInput"
);

let filter =
input.value.toLowerCase();

let rows =
document.querySelectorAll(
"#memberBody tr"
);

rows.forEach(row=>{

let text =
row.innerText.toLowerCase();

row.style.display =
text.includes(filter)
? ""
: "none";

});

}

function exportCSV(){

let csv =
"Name,Email,Role,Status\n";

members.forEach(member=>{

csv +=
member.name + "," +
member.email + "," +
member.role + "," +
member.status + "\n";

});

let blob =
new Blob(
[csv],
{type:"text/csv"}
);

let url =
window.URL.createObjectURL(
blob
);

let a =
document.createElement("a");

a.href=url;

a.download=
"team-members.csv";

a.click();

window.URL.revokeObjectURL(
url
);

addActivity(
"Team list exported"
);

}

renderMembers();

addActivity(
"Team dashboard loaded"
);

window.onclick =
function(event){

let modal =
document.getElementById(
"inviteModal"
);

if(event.target === modal){

closeModal();

}

};

</script>

</div>
</body>
</html>
